<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Admin | Control Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; padding: 20px; }
        .admin-container { max-width: 600px; margin: 0 auto; background: #1a1a1a; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #fff; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #b3b3b3; font-size: 14px; }
        input, select { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #333; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: #fff; }
        .add-btn { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .add-btn:hover { background: #e0e0e0; transform: scale(1.02); }
        .song-list { margin-top: 30px; }
        .song-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #fff; }
        .del-btn { background: none; border: none; color: #ff4444; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>🌙 Moonlight Admin</h2>
    
    <form method="POST">
        <div class="form-group">
            <label>Song Title</label>
            <input type="text" name="title" placeholder="e.g. Nayan - Dhvani Bhanushali" required>
        </div>

        <div class="form-group">
            <label>YouTube ID (For Thumbnail/Photo)</label>
            <input type="text" name="link" placeholder="e.g. dQw4w9WgXcQ" required>
        </div>

        <div class="form-group">
            <label>Archive.org MP3 Link</label>
            <input type="text" name="audio_url" placeholder="https://archive.org/download/.../song.mp3" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category">
                <option value="Lofi">Lofi</option>
                <option value="Mashup">Mashup</option>
                <option value="Trending">Trending</option>
                <option value="Chill">Chill</option>
            </select>
        </div>

        <button type="submit" class="add-btn">ADD TO MOONLIGHT</button>
    </form>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #333;">

    <h3>Current Songs ({{ songs|length }})</h3>
    <div class="song-list">
        {% for song in songs %}
        <div class="song-item">
            <div>
                <p style="margin: 0; font-weight: bold;">{{ song[1] }}</p>
                <small style="color: #888;">{{ song[3] }} | {{ 'MP3' if song[6] else 'YT' }}</small>
            </div>
            <form method="POST" style="display:inline;">
                <input type="hidden" name="delete_id" value="{{ song[0] }}">
                <button type="submit" class="del-btn">
                    <i class="material-icons">delete</i>
                </button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
