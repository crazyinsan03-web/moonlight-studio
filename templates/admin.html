<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0c29; color: white; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        input, select { padding: 10px; margin: 5px; border-radius: 5px; border: none; width: 250px; }
        button { padding: 10px 20px; background: #24c6dc; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .song-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 10px 0; }
        .del-btn { background: #ff4b2b; }
    </style>
</head>
<body>
    <h1>🌙 Moonlight Admin Control</h1>
    
    <div class="glass-card">
        <h3>Add New Song</h3>
        <form method="POST">
            <input type="text" name="title" placeholder="Song Title" required>
            <input type="text" name="link" placeholder="YouTube Link" required>
            <select name="category">
                <option value="Lofi">Lofi</option>
                <option value="Punjabi">Punjabi</option>
                <option value="Mashup">Mashup</option>
            </select>
            <button type="submit">Add Song</button>
        </form>
    </div>

    <div class="glass-card">
        <h3>Current Library</h3>
        {% for song in songs %}
        <div class="song-item">
            <span>{{ song[1] }} ({{ song[3] }})</span>
            <form method="POST" style="display:inline;">
                <input type="hidden" name="delete_id" value="{{ song[0] }}">
                <button type="submit" class="del-btn">Delete</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
