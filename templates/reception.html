<!DOCTYPE html>
<html>
<head>
    <title>Reception Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
  
 



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fa;">

<div class="container-fluid p-3">

<h3 class="text-center mb-4">💰 Reception Panel</h3>

<div class="row g-3">

{% for table, orders in tables.items() %}
<div class="col-6 col-md-4 col-lg-3">

    <a href="/bill/{{table}}" class="btn btn-success w-100 p-3 shadow-sm rounded-4">
        🪑 Table {{table}}
    </a>

</div>
{% endfor %}

</div>

<a href="/" class="btn btn-secondary w-100 mt-4">⬅ Back Home</a>

</div>

</body>
</html>
