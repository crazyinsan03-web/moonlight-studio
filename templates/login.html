<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight - Join the Vibe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-glow"></div>
    
    <div class="login-container">
        <div class="glass-card">
            <div class="logo-section">
                <div class="moon-icon">🌙</div>
                <h1>Moonlight</h1>
                <p>Feel the night, hear the vibe.</p>
            </div>

            <div id="signup-form">
                <h3>Create Account</h3>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reg-name" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" id="reg-phone" placeholder="Phone Number">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="reg-pass" placeholder="Set Password">
                </div>
                <button class="main-btn" onclick="handleSignup()">Start Listening</button>
                <p class="switch-text">Already a member? <a href="#" onclick="toggleForm()">Login</a></p>
            </div>

            <div id="login-form" style="display: none;">
                <h3>Welcome Back</h3>
                <div class="input-group">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" id="login-phone" placeholder="Phone Number">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-pass" placeholder="Password">
                </div>
                <button class="main-btn" onclick="handleLogin()">Login</button>
                <p class="switch-text">New here? <a href="#" onclick="toggleForm()">Join Now</a></p>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='auth.js') }}"></script>
</body>
</html>
