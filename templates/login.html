<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Moonlight Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #020205; color: white; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { width: 90%; max-width: 400px; background: rgba(255,255,255,0.02); padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 12px; outline: none; box-sizing: border-box; }
        input:focus { border-color: #00e5ff; }
        button { width: 100%; padding: 15px; background: #00e5ff; color: black; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 20px; }
        .error { color: #ff4d4d; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 style="letter-spacing: -1.5px;">Moonlight</h1>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 30px;">Admin Access Only</p>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">ENTER STUDIO</button>
        </form>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="error">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
