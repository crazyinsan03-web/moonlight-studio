<!DOCTYPE html>
<html>
<head>
    <title>Chef Panel</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

  
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fa;">

<div class="container-fluid p-3">

<h3 class="text-center mb-3">👨‍🍳 Kitchen Dashboard</h3>

<div class="row g-3">

{% for table, orders in tables.items() %}
<div class="col-12 col-md-6 col-lg-4">

    <div class="card p-3 shadow-sm border-0 rounded-4 h-100">

        <!-- Table Title -->
        <h5 class="mb-2">🪑 Table {{table}}</h5>

        <!-- Orders List -->
        {% for order in orders %}
        <div class="border-bottom pb-1 mb-1 d-flex justify-content-between">

            <div>
                <b>{{order.item}}</b> × {{order.qty}}
            </div>

            <span class="badge 
                {% if order.status == 'pending' %}bg-secondary
                {% elif order.status == 'preparing' %}bg-warning text-dark
                {% elif order.status == 'ready' %}bg-success
                {% endif %}
            ">
                {{order.status}}
            </span>

        </div>
        {% endfor %}

        <!-- Buttons -->
        <div class="mt-3">

            <a href="/update_table/{{table}}/preparing"
               class="btn btn-warning w-100 mb-2">
               🔥 Cooking
            </a>

            <a href="/update_table/{{table}}/ready"
               class="btn btn-success w-100">
               ✅ Done
            </a>

        </div>

    </div>

</div>
{% endfor %}

</div>

<a href="/" class="btn btn-secondary w-100 mt-4">⬅ Back Home</a>

</div>

</body>
</html>
