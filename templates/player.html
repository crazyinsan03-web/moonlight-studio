<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ song[1] }} | Moonlight</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="player-body">

    <div class="player-header">
        <button class="back-btn" onclick="window.location.href='/'"><i class="material-icons">expand_more</i></button>
        <div class="playing-from">
            <p class="small-text">PLAYING FROM CATEGORY</p>
            <p class="cat-name">{{ song[3] }}</p>
        </div>
        <button class="more-options"><i class="material-icons">more_vert</i></button>
    </div>

    <div class="player-main-content">
        <audio id="mainAudio" src="{{ song[4] }}" preload="auto" playsinline autoplay></audio>

        <div class="visualizer-container" style="display:flex; flex-direction:column; align-items:center;">
            <img src="https://img.youtube.com/vi/{{ song[2] }}/maxresdefault.jpg" class="player-album-art" style="width:80%; border-radius:20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div class="playing-waves" id="waveContainer" style="margin-top:20px;">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div class="song-meta">
            <div class="title-wrap">
                <h2 class="player-title">{{ song[1] }}</h2>
                <p class="artist-name">Moonlight Original</p>
            </div>
            <button class="heart-btn" id="likeBtn"><i class="material-icons">favorite_border</i></button>
        </div>

        <div class="progress-container">
            <div class="time-bar" id="progressBar" style="cursor:pointer;"><div class="progress-fill" id="seekProgress"></div></div>
            <div class="time-stamps"><span id="currentTime">0:00</span><span id="totalDuration">0:00</span></div>
        </div>

        <div class="main-controls">
            <button class="ctrl-btn"><i class="material-icons">shuffle</i></button>
            <button class="ctrl-btn" onclick="window.history.back()"><i class="material-icons">skip_previous</i></button>
            <button class="play-pause-circle" onclick="togglePlay()"><i class="material-icons" id="playIcon">pause</i></button>
            <button class="ctrl-btn" onclick="window.location.href='/player/{{ next_id }}'"><i class="material-icons">skip_next</i></button>
            <button class="ctrl-btn"><i class="material-icons">repeat</i></button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const playIcon = document.getElementById('playIcon');
        const waves = document.getElementById('waveContainer');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.innerText = "pause";
                waves.classList.remove('paused-waves');
            } else {
                audio.pause();
                playIcon.innerText = "play_arrow";
                waves.classList.add('paused-waves');
            }
        }

        audio.ontimeupdate = () => {
            if (audio.duration) {
                const perc = (audio.currentTime / audio.duration) * 100;
                document.getElementById('seekProgress').style.width = perc + "%";
                document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
                document.getElementById('totalDuration').innerText = formatTime(audio.duration);
            }
        };

        document.getElementById('progressBar').onclick = (e) => {
            const rect = document.getElementById('progressBar').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        function formatTime(t) {
            let m = Math.floor(t/60), s = Math.floor(t%60);
            return m + ":" + (s<10?'0':'') + s;
        }

        audio.onended = () => { window.location.href='/player/{{ next_id }}'; };
    </script>
</body>
</html>
