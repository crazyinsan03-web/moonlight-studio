<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ song[1] }} | Moonlight Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='player.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="player-body">

    <div class="player-container">
        <div class="top-nav">
            <button class="icon-btn" onclick="window.location.href='/'">
                <i class="material-icons">expand_more</i>
            </button>
            <div class="header-info">
                <span class="label">PLAYING FROM MASHUPS</span>
                <span class="cat-title">{{ song[3] }}</span>
            </div>
            <button class="icon-btn">
                <i class="material-icons">more_vert</i>
            </button>
        </div>

        <div class="art-section">
            <img src="https://img.youtube.com/vi/{{ song[2] }}/maxresdefault.jpg" alt="Art" class="main-album-art">
        </div>

        <div class="song-meta-row">
            <div class="details">
                <h1 class="title-text">{{ song[1] }}</h1>
                <p class="artist-text">Moonlight Studio</p>
            </div>
            <button class="icon-btn blue-accent">
                <i class="material-icons">check_circle</i>
            </button>
        </div>

        <div class="playback-seek">
            <div class="progress-track" id="progressArea">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currTime">0:00</span>
                <span id="durTime">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button class="btn-small"><i class="material-icons">shuffle</i></button>
            <button class="btn-skip" onclick="window.location.href='/player/{{ next_id }}'"><i class="material-icons">skip_previous</i></button>
            
            <button class="main-play-btn" onclick="togglePlay()">
                <i class="material-icons" id="playIcon">pause</i>
            </button>

            <button class="btn-skip" onclick="window.location.href='/player/{{ next_id }}'"><i class="material-icons">skip_next</i></button>
            <button class="btn-small"><i class="material-icons">repeat</i></button>
        </div>

        <div class="bottom-icons">
            <i class="material-icons blue-accent">important_devices</i>
            <i class="material-icons">share</i>
        </div>

        <audio id="mainAudio" src="{{ song[4] }}" preload="auto" autoplay></audio>
    </div>

 <script>
    const audio = document.getElementById('mainAudio');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const progressArea = document.getElementById('progressArea');
    
    let audioContext, analyser, sourceNode, isDragging = false;
    const dataArray = new Uint8Array(32);

    // 1. Play/Pause Function
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playIcon.innerText = "pause";
        } else {
            audio.pause();
            playIcon.innerText = "play_arrow";
        }
    }

    // 2. Audio Visualizer Setup (Awaaz Fix)
    function initVisualizer() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            sourceNode = audioContext.createMediaElementSource(audio);
            
            // Connection: Source -> Analyser -> Speakers (Destination)
            sourceNode.connect(analyser);
            analyser.connect(audioContext.destination); 
            
            analyser.fftSize = 64;
            renderFrame();
        }
    }

    function renderFrame() {
        requestAnimationFrame(renderFrame);
        analyser.getByteFrequencyData(dataArray);

        let bass = dataArray[1]; 
        let scale = 1 + (bass / 600);
        let brightness = 15 + (bass / 10);

        // Thumbnail Vibrate
        const art = document.querySelector('.main-album-art');
        if (art) {
            art.style.transform = `scale(${scale})`;
            art.style.boxShadow = `0 20px ${40 + bass/2}px rgba(65, 105, 225, 0.5)`;
        }

        // Background Beats
        document.body.style.background = `radial-gradient(circle at center, hsl(225, 70%, ${brightness}%) 0%, #121212 100%)`;
    }

    // 3. Sliding & Time Updates
    const moveProgress = (e) => {
        const rect = progressArea.getBoundingClientRect();
        let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        let width = rect.width;
        if (x < 0) x = 0; if (x > width) x = width;
        const percentage = (x / width) * 100;
        progressBar.style.width = percentage + "%";
        return (x / width) * audio.duration;
    };

    progressArea.addEventListener('mousedown', () => isDragging = true);
    progressArea.addEventListener('touchstart', () => isDragging = true);
    window.addEventListener('mousemove', (e) => { if (isDragging) moveProgress(e); });
    window.addEventListener('touchmove', (e) => { if (isDragging) moveProgress(e); });
    window.addEventListener('mouseup', (e) => { 
        if (isDragging) { audio.currentTime = moveProgress(e); isDragging = false; }
    });
    window.addEventListener('touchend', (e) => {
        if (isDragging) { audio.currentTime = moveProgress(e); isDragging = false; }
    });

    audio.ontimeupdate = () => {
        if (!isDragging && audio.duration) {
            const perc = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = perc + "%";
            document.getElementById('currTime').innerText = formatTime(audio.currentTime);
            document.getElementById('durTime').innerText = formatTime(audio.duration);
        }
    };

    function formatTime(t) {
        let m = Math.floor(t/60), s = Math.floor(t%60);
        return m + ":" + (s < 10 ? '0' : '') + s;
    }

    // Start everything on Play
    audio.onplay = () => {
        initVisualizer();
        if (audioContext.state === 'suspended') audioContext.resume();
        playIcon.innerText = "pause";
    };

    audio.onended = () => {
        if("{{ next_id }}" !== "None") window.location.href = '/player/{{ next_id }}';
    };
</script>
</body>
</html>
