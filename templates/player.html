<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ song[1] }} | Moonlight Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='player.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="player-body">

    <div class="player-container">
        <div class="top-nav">
            <button class="icon-btn" onclick="window.location.href='/'">
                <i class="material-icons">expand_more</i>
            </button>
            <div class="header-info">
                <span class="label">PLAYING FROM MASHUPS</span>
                <span class="cat-title">{{ song[3] }}</span>
            </div>
            <button class="icon-btn">
                <i class="material-icons">more_vert</i>
            </button>
        </div>

        <div class="art-section">
            <img src="https://img.youtube.com/vi/{{ song[2] }}/maxresdefault.jpg" alt="Art" class="main-album-art">
        </div>

        <div class="song-meta-row">
            <div class="details">
                <h1 class="title-text">{{ song[1] }}</h1>
                <p class="artist-text">Moonlight Studio</p>
            </div>
            <button class="icon-btn blue-accent">
                <i class="material-icons">check_circle</i>
            </button>
        </div>

        <div class="playback-seek">
            <div class="progress-track" id="progressArea">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="time-labels">
                <span id="currTime">0:00</span>
                <span id="durTime">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button class="btn-small"><i class="material-icons">shuffle</i></button>
            <button class="btn-skip" onclick="window.location.href='/player/{{ next_id }}'"><i class="material-icons">skip_previous</i></button>
            
            <button class="main-play-btn" onclick="togglePlay()">
                <i class="material-icons" id="playIcon">pause</i>
            </button>

            <button class="btn-skip" onclick="window.location.href='/player/{{ next_id }}'"><i class="material-icons">skip_next</i></button>
            <button class="btn-small"><i class="material-icons">repeat</i></button>
        </div>

        <div class="bottom-icons">
            <i class="material-icons blue-accent">important_devices</i>
            <i class="material-icons">share</i>
        </div>

        <audio id="mainAudio" src="{{ song[4] }}" preload="auto" autoplay></audio>
    </div>

  <script>
    const audio = document.getElementById('mainAudio');
    const playIcon = document.getElementById('playIcon');
    const progressBar = document.getElementById('progressBar');
    const progressArea = document.getElementById('progressArea');
    let isDragging = false;

    // 1. Play/Pause Function
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            playIcon.innerText = "pause";
        } else {
            audio.pause();
            playIcon.innerText = "play_arrow";
        }
    }

    // 2. Sliding Logic (Touch aur Mouse dono ke liye)
    const moveProgress = (e) => {
        const rect = progressArea.getBoundingClientRect();
        let x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        let width = rect.width;
        if (x < 0) x = 0;
        if (x > width) x = width;
        const percentage = (x / width) * 100;
        progressBar.style.width = percentage + "%";
        return (x / width) * audio.duration;
    };

    const startDrag = (e) => { isDragging = true; };
    const duringDrag = (e) => { if (isDragging) moveProgress(e); };
    const endDrag = (e) => {
        if (isDragging) {
            audio.currentTime = moveProgress(e);
            isDragging = false;
        }
    };

    // Events Attach Karo
    progressArea.addEventListener('mousedown', startDrag);
    progressArea.addEventListener('touchstart', startDrag);
    window.addEventListener('mousemove', duringDrag);
    window.addEventListener('touchmove', duringDrag);
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);

    // 3. Normal Time Update
    audio.ontimeupdate = () => {
        if (!isDragging && audio.duration) {
            const perc = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = perc + "%";
            document.getElementById('currTime').innerText = formatTime(audio.currentTime);
            document.getElementById('durTime').innerText = formatTime(audio.duration);
        }
    };

    function formatTime(t) {
        let m = Math.floor(t/60), s = Math.floor(t%60);
        return m + ":" + (s < 10 ? '0' : '') + s;
    }
    
    // Auto Next logic
    audio.onended = () => {
        if("{{ next_id }}" !== "None") {
            window.location.href = '/player/{{ next_id }}';
        }
    };


// Audio Context aur Nodes setup
// 1. Audio Visualizer Variables
let audioContext;
let analyser;
let sourceNode;
const dataArray = new Uint8Array(32);

function initVisualizer() {
    if (!audioContext) {
        // Audio Context shuru karo
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        
        // Audio element ko analyzer se jodo
        sourceNode = audioContext.createMediaElementSource(audio);
        
        // --- YE HAI FIX ---
        sourceNode.connect(analyser);
        analyser.connect(audioContext.destination); // Speaker se connection joda
        
        analyser.fftSize = 64;
        animateAudioEffects();
    }
}

function animateAudioEffects() {
    requestAnimationFrame(animateAudioEffects);
    if (!analyser) return;
    
    analyser.getByteFrequencyData(dataArray);

    let bass = dataArray[1]; 
    let scale = 1 + (bass / 600); // Beats par halka vibrate
    let brightness = 15 + (bass / 12); // Background blue glow intensity

    const art = document.querySelector('.main-album-art');
    if (art) {
        art.style.transform = `scale(${scale})`;
        art.style.boxShadow = `0 20px ${40 + bass/2}px rgba(65, 105, 225, 0.5)`;
    }

    // Dynamic Background Beats
    document.body.style.background = `radial-gradient(circle at center, hsl(225, 70%, ${brightness}%) 0%, #121212 100%)`;
}

// 2. Play hone par Visualizer activate ho
audio.onplay = () => {
    initVisualizer();
    if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
    }
};

    // Dynamic Background Color
    document.body.style.background = `radial-gradient(circle at center, hsl(225, 70%, ${brightness}%) 0%, #121212 100%)`;
}

// Jab Play dabayein tab awaaz aur visualizer dono shuru hon
audio.onplay = () => {
    initVisualizer();
    if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
    }
};
function animateAudioEffects() {
    requestAnimationFrame(animateAudioEffects);
    analyser.getByteFrequencyData(dataArray);

    // 1. Bass pakadne ke liye (pehle 3-4 bins)
    let bass = dataArray[1]; 
    let scale = 1 + (bass / 500); // Thumbnail scaling factor
    let brightness = 50 + (bass / 2); // Background brightness

    // 2. Thumbnail Movement (Scale & Glow)
    const art = document.querySelector('.main-album-art');
    art.style.transform = `scale(${scale})`;
    art.style.boxShadow = `0 0 ${bass/2}px var(--royal-glow)`;

    // 3. Dynamic Background Color (Royal Blue ke shades mein)
    const hue = 225; // Royal Blue Hue
    const saturation = 50 + (bass / 5); // Beats par color deep hoga
    document.body.style.background = `radial-gradient(circle, hsl(${hue}, ${saturation}%, ${brightness/3}%) 0%, #121212 100%)`;
}

// Jab pehli baar play ho tab audio context start karein
audio.onplay = () => {
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }
    animateAudioEffects();
};
      
</script>
</body>
</html>
