<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ song[1] }} | Moonlight Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='player.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="player-body">

    <div class="player-container">
        <div class="player-header">
            <button class="icon-btn" onclick="window.location.href='/'">
                <i class="material-icons">expand_more</i>
            </button>
            <div class="header-text">
                <p class="small-label">PLAYING FROM MASHUPS</p>
                <p class="category-name">{{ song[3] }}</p>
            </div>
            <button class="icon-btn">
                <i class="material-icons">more_vert</i>
            </button>
        </div>

        <div class="album-art-wrapper">
            <img src="https://img.youtube.com/vi/{{ song[2] }}/maxresdefault.jpg" alt="Song Art" class="spotify-art">
        </div>

        <div class="song-info-row">
            <div class="song-details">
                <h1 class="song-title">{{ song[1] }}</h1>
                <p class="artist-name">Moonlight Studio</p>
            </div>
            <button class="icon-btn blue-icon">
                <i class="material-icons">check_circle</i>
            </button>
        </div>

        <div class="progress-container">
            <div class="bar-bg" id="progressBar">
                <div class="bar-fill" id="progressFill"></div>
                <div class="bar-knob" id="progressKnob"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">0:00</span>
                <span id="totalDuration">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button class="ctrl-btn"><i class="material-icons">shuffle</i></button>
            <button class="ctrl-btn skip" onclick="window.location.href='/player/{{ next_id }}'"><i class="material-icons">skip_previous</i></button>
            
            <button class="play-btn" onclick="togglePlay()">
                <i class="material-icons" id="playIcon">pause</i>
            </button>

            <button class="ctrl-btn skip" onclick="window.location.href='/player/{{ next_id }}'"><i class="material-icons">skip_next</i></button>
            <button class="ctrl-btn"><i class="material-icons">repeat</i></button>
        </div>

        <div class="footer-icons">
            <i class="material-icons blue-icon">important_devices</i>
            <i class="material-icons">share</i>
        </div>

        <audio id="mainAudio" src="{{ song[4] }}" preload="auto" autoplay></audio>
    </div>

    <script>
        const audio = document.getElementById('mainAudio');
        const playIcon = document.getElementById('playIcon');
        const progressFill = document.getElementById('progressFill');
        const progressBar = document.getElementById('progressBar');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.innerText = "pause";
            } else {
                audio.pause();
                playIcon.innerText = "play_arrow";
            }
        }

        audio.ontimeupdate = () => {
            const perc = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = perc + "%";
            document.getElementById('currentTime').innerText = formatTime(audio.currentTime);
            document.getElementById('totalDuration').innerText = formatTime(audio.duration);
        };

        function formatTime(t) {
            let m = Math.floor(t/60), s = Math.floor(t%60);
            return m + ":" + (s<10?'0':'') + s;
        }

        audio.onended = () => {
            if("{{ next_id }}" !== "None") {
                window.location.href = '/player/{{ next_id }}';
            }
        };
    </script>
</body>
</html>
