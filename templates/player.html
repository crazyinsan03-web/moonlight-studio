<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ song[1] }} | Moonlight</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="player-body">

    <div class="player-header">
        <button class="back-btn" onclick="window.location.href='/'">
            <i class="material-icons">expand_more</i>
        </button>
        <div class="playing-from">
            <p class="small-text">PLAYING FROM CATEGORY</p>
            <p class="cat-name">{{ song[3] }}</p>
        </div>
        <button class="more-options"><i class="material-icons">more_vert</i></button>
    </div>

    <div class="player-main-content">
        <div class="visualizer-container">
            <div class="playing-waves" id="waveContainer">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>

        <div class="song-meta">
            <div class="title-wrap">
                <h2 class="player-title">{{ song[1] }}</h2>
                <p class="artist-name">Moonlight Original</p>
            </div>
            <button class="heart-btn" id="likeBtn" onclick="sendLike({{ song[0] }})">
                <i class="material-icons" id="heartIcon">favorite_border</i>
            </button>
        </div>

        <div class="progress-container">
            <div class="time-bar" id="progressBar" style="cursor: pointer;">
                <div class="progress-fill" id="seekProgress"></div>
            </div>
            <div class="time-stamps">
                <span id="currentTime">0:00</span>
                <span id="totalDuration">0:00</span>
            </div>
        </div>

        <div class="main-controls">
            <button class="ctrl-btn"><i class="material-icons">shuffle</i></button>
            <button class="ctrl-btn" onclick="window.history.back()"><i class="material-icons">skip_previous</i></button>
            
            <button class="play-pause-circle" onclick="togglePlay()">
                <i class="material-icons" id="playIcon">pause</i>
            </button>

            <button class="ctrl-btn" onclick="goToNext()"><i class="material-icons">skip_next</i></button>
            <button class="ctrl-btn"><i class="material-icons">repeat</i></button>
        </div>
    </div>

    <div id="player"></div>

   <script>
    // 1. YouTube API Load karo
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    
    // 2. Player Setup (Speed Hacks ke saath)
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '0',
            width: '0',
            videoId: '{{ song[2] }}',
            playerVars: { 
                'autoplay': 1, 
                'controls': 0, 
                'modestbranding': 1, 
                'playsinline': 1,
                'rel': 0,
                'vq': 'tiny' // <--- Sabse low quality taaki buffering na ho
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    // 3. Player Ready hone par quality lock karo
    function onPlayerReady(event) {
        event.target.setPlaybackQuality('small'); 
        updateProgress();
    }

    // 4. Like Function (Neon Glow + Database Entry)
    function sendLike(songId) {
        let btn = document.getElementById('likeBtn');
        let icon = document.getElementById('heartIcon');
        
        if (!btn.classList.contains('active')) {
            btn.classList.add('active');
            icon.innerText = "favorite"; 
            
            fetch(`/like/${songId}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if(data.success) console.log("Moonlight: Song Liked! 🌙");
            });
        } else {
            btn.classList.remove('active');
            icon.innerText = "favorite_border";
        }
    }

    // 5. Play/Pause Logic (Waves control ke saath)
    function togglePlay() {
        let icon = document.getElementById('playIcon');
        let waves = document.getElementById('waveContainer');
        
        if (player.getPlayerState() == 1) { // Playing
            player.pauseVideo();
            icon.innerText = "play_arrow";
            waves.classList.add('paused-waves');
        } else {
            player.playVideo();
            icon.innerText = "pause";
            waves.classList.remove('paused-waves');
        }
    }

    // 6. Progress Bar (Seeking/Age-piche karna)
    document.getElementById('progressBar').addEventListener('click', function(e) {
        if (player && player.getDuration) {
            let rect = this.getBoundingClientRect();
            let x = e.clientX - rect.left; 
            let width = rect.width; 
            let perc = x / width; 
            let duration = player.getDuration();
            player.seekTo(duration * perc, true); 
        }
    });

    function updateProgress() {
        setInterval(() => {
            if (player && player.getCurrentTime) {
                let curr = player.getCurrentTime();
                let dur = player.getDuration();
                if (dur > 0) {
                    let perc = (curr / dur) * 100;
                    document.getElementById('seekProgress').style.width = perc + "%";
                    document.getElementById('currentTime').innerText = formatTime(curr);
                    document.getElementById('totalDuration').innerText = formatTime(dur);
                }
            }
        }, 500);
    }

    function formatTime(time) {
        let min = Math.floor(time / 60);
        let sec = Math.floor(time % 60);
        return min + ":" + (sec < 10 ? '0' : '') + sec;
    }

    function goToNext() {
        {% if next_id %}
            window.location.href = "/player/{{ next_id }}";
        {% else %}
            window.location.href = "/";
        {% endif %}
    }

    function onPlayerStateChange(event) {
        let icon = document.getElementById('playIcon');
        let waves = document.getElementById('waveContainer');
        
        if (event.data == YT.PlayerState.PLAYING) {
            icon.innerText = "pause";
            waves.classList.remove('paused-waves');
        } else if (event.data == YT.PlayerState.PAUSED) {
            icon.innerText = "play_arrow";
            waves.classList.add('paused-waves');
        } else if (event.data == YT.PlayerState.ENDED) {
            goToNext();
        }
    }
</script>
</body>
</html>
